name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Import signing certificate
        if: env.CERTIFICATE_P12 != ''
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::warning::No Developer ID identity found in certificate. Falling back to ad-hoc signing."
            echo "SIGN_IDENTITY=-" >> $GITHUB_ENV
          else
            echo "Found signing identity: $IDENTITY"
            echo "SIGN_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          fi

      - name: Set fallback signing
        if: env.SIGN_IDENTITY == ''
        run: echo "SIGN_IDENTITY=-" >> $GITHUB_ENV

      - name: Build release binary
        run: |
          xcodebuild -scheme HolaAI \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_DIR="dist/Hola-AI.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp build/Build/Products/Release/HolaAI "${APP_DIR}/Contents/MacOS/HolaAI"
          cp Info.plist "${APP_DIR}/Contents/Info.plist"

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "${APP_DIR}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "${APP_DIR}/Contents/Info.plist"

          # PkgInfo
          echo -n "APPL????" > "${APP_DIR}/Contents/PkgInfo"

          if [ -f Sources/HolaAI/Resources/AppIcon.icns ]; then
            cp Sources/HolaAI/Resources/AppIcon.icns "${APP_DIR}/Contents/Resources/AppIcon.icns"
          fi

          RESOURCE_BUNDLE=$(find build/Build/Products -name "HolaAI_HolaAI.bundle" -type d 2>/dev/null | head -1)
          if [ -n "${RESOURCE_BUNDLE}" ] && [ -d "${RESOURCE_BUNDLE}" ]; then
            cp -R "${RESOURCE_BUNDLE}" "${APP_DIR}/Contents/Resources/"
          fi

      - name: Sign app bundle
        run: |
          # Create entitlements
          cat > dist/entitlements.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.automation.apple-events</key>
              <true/>
          </dict>
          </plist>
          PLIST

          echo "Signing with: $SIGN_IDENTITY"
          codesign --force --deep --sign "$SIGN_IDENTITY" \
            --entitlements dist/entitlements.plist \
            --options runtime \
            dist/Hola-AI.app

          # Verify signature
          codesign --verify --verbose dist/Hola-AI.app

          # Remove quarantine
          xattr -cr dist/Hola-AI.app

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="Hola-AI-macOS-${VERSION}.dmg"
          mkdir -p dist/dmg
          cp -R dist/Hola-AI.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Hola-AI" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/${DMG_NAME}"

          # Sign the DMG too if we have a real identity
          if [[ "$SIGN_IDENTITY" != "-" ]]; then
            codesign --force --sign "$SIGN_IDENTITY" "dist/${DMG_NAME}"
          fi

          echo "DMG_PATH=dist/${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV

      - name: Notarize DMG
        if: env.SIGN_IDENTITY != '-'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "::warning::Notarization secrets not configured. Skipping notarization."
            exit 0
          fi

          echo "Submitting DMG for notarization..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          echo "Notarization complete!"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hola-ai-macos
          path: ${{ env.DMG_PATH }}

      - name: Upload to GitHub Release (tag only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          body: |
            ## Installation

            ### macOS
            1. Download the `.dmg` file
            2. Open the DMG and drag **Hola-AI** to Applications
            3. Grant Microphone and Accessibility permissions when prompted

            ### Windows
            1. Download the `.exe` file
            2. Run it — Windows may show a SmartScreen warning, click **"More info" > "Run anyway"**
          append_body: true
