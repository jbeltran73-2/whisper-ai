name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: |
          xcodebuild -scheme HolaAI \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_DIR="dist/Hola-AI.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp build/Build/Products/Release/HolaAI "${APP_DIR}/Contents/MacOS/HolaAI"
          cp Info.plist "${APP_DIR}/Contents/Info.plist"

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "${APP_DIR}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "${APP_DIR}/Contents/Info.plist"

          # PkgInfo
          echo -n "APPL????" > "${APP_DIR}/Contents/PkgInfo"

          if [ -f Sources/HolaAI/Resources/AppIcon.icns ]; then
            cp Sources/HolaAI/Resources/AppIcon.icns "${APP_DIR}/Contents/Resources/AppIcon.icns"
          fi

          RESOURCE_BUNDLE=$(find build/Build/Products -name "HolaAI_HolaAI.bundle" -type d 2>/dev/null | head -1)
          if [ -n "${RESOURCE_BUNDLE}" ] && [ -d "${RESOURCE_BUNDLE}" ]; then
            cp -R "${RESOURCE_BUNDLE}" "${APP_DIR}/Contents/Resources/"
          fi

      - name: Sign app bundle
        run: |
          # Create entitlements
          cat > dist/entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.automation.apple-events</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Ad-hoc sign with entitlements
          codesign --force --deep --sign - \
            --entitlements dist/entitlements.plist \
            --options runtime \
            dist/Hola-AI.app

          # Remove quarantine
          xattr -cr dist/Hola-AI.app

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="Hola-AI-macOS-${VERSION}.dmg"
          mkdir -p dist/dmg
          cp -R dist/Hola-AI.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Hola-AI" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "dist/${DMG_NAME}"
          echo "DMG_PATH=dist/${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hola-ai-macos
          path: ${{ env.DMG_PATH }}

      - name: Upload to GitHub Release (tag only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          body: |
            ## Installation

            ### macOS
            1. Download the `.dmg` file
            2. Open the DMG and drag **Hola-AI** to Applications
            3. On first launch, macOS will show a security warning (the app is not notarized). To fix:
               - Open **System Settings > Privacy & Security**
               - Scroll down and click **"Open Anyway"** next to the Hola-AI message
               - Or run in Terminal: `xattr -cr /Applications/Hola-AI.app`
            4. Grant Microphone and Accessibility permissions when prompted

            ### Windows
            1. Download the `.exe` file
            2. Run it — Windows may show a SmartScreen warning, click **"More info" > "Run anyway"**
          append_body: true
